<html lang="en">

<meta charset="UTF-8">
<title>Velocity Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0f1214;color:#e0e0e0;padding:20px}

.sub{color:#888;font-size:13px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#1a1d21;border:1px solid #333;border-radius:8px;padding:16px}
.card h2{font-size:13px;color:#92C5F9;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.m{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #222;font-size:13px}
.m:last-child{border:none}
.m .l{color:#888}
.m .v{font-weight:600}
.g{color:#4caf50}.y{color:#f0c674}.r{color:#ef5350}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 6px;color:#888;border-bottom:1px solid #333}
td{padding:5px 6px;border-bottom:1px solid #222}
.full{grid-column:1/-1}
.bar{height:14px;border-radius:3px;min-width:2px;display:inline-block;vertical-align:middle;margin-left:1px}
.bar:first-child{margin-left:0}
a{color:#92C5F9;text-decoration:none}
.legend{display:flex;gap:16px;margin-bottom:8px;font-size:11px;color:#888}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.wkend{background:#1e1e2e}
</style>
</head>
<body>
<h1>Velocity Dashboard</h1>
<div class="sub" id="sub">Loading data.json...</div>
<div class="grid" id="grid"></div>
<script>
var DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function med(a){if(!a.length)return 0;var s=a.slice().sort(function(x,y){return x-y}),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2}
function wkOf(d){var t=new Date(d),m=new Date(t);m.setDate(t.getDate()-((t.getDay()+6)%7));return m.toISOString().slice(0,10)}
function card(t,f){var d=document.createElement('div');d.className='card'+(f?' full':'');var h=document.createElement('h2');h.textContent=t;d.appendChild(h);document.getElementById('grid').appendChild(d);return d}
function addM(el,label,val,cls){var d=document.createElement('div');d.className='m';d.insertAdjacentHTML('beforeend','<span class="l">'+label+'</span><span class="v '+(cls||'')+'">'+val+'</span>');el.appendChild(d)}
function bw(v,mx,px){return Math.round((v/mx)*px)}
function br(w,c){return w?'<span class="bar" style="width:'+w+'px;background:'+c+'"></span>':''}
var PRL='<div class="legend"><span><span class="dot" style="background:#0066cc"></span> merged\u2192main</span><span><span class="dot" style="background:#B6A6E9"></span> merged\u2192feat</span><span><span class="dot" style="background:#4caf50"></span> opened</span><span><span class="dot" style="background:#ef5350"></span> closed</span></div>';
var LNL='<div class="legend"><span><span class="dot" style="background:#4caf50"></span> additions</span><span><span class="dot" style="background:#ef5350"></span> deletions</span></div>';

fetch('./data.json').then(function(r){return r.json()}).then(function(raw){
var MERGED=raw.merged,OPEN=raw.open,CLOSED=raw.closed;
var now=new Date(),cut=new Date(now);cut.setDate(now.getDate()-raw.days);
var repos=raw.repos||[raw.repo||'unknown'];
var hm=MERGED.filter(function(p){return!p.author.is_bot&&new Date(p.mergedAt)>=cut});
document.getElementById('sub').textContent=repos.join(', ')+' \u00b7 '+cut.toISOString().slice(0,10)+' \u2192 '+now.toISOString().slice(0,10)+' \u00b7 Generated '+raw.generated;

// --- Build daily buckets ---
var dy={};
for(var i=0;i<raw.days;i++){var dd=new Date(now);dd.setDate(now.getDate()-(raw.days-1)+i);var dk=dd.toISOString().slice(0,10);dy[dk]={mm:0,mf:0,op:0,cl:0,ad:0,dl:0,ct:new Set(),mg:0,dn:DN[dd.getDay()],we:dd.getDay()===0||dd.getDay()===6}}
hm.forEach(function(p){var dk=p.mergedAt.slice(0,10);if(!dy[dk])return;if(p.baseRefName==='main')dy[dk].mm++;else dy[dk].mf++;dy[dk].ad+=p.additions;dy[dk].dl+=p.deletions;dy[dk].ct.add(p.author.login);(p.reviewers||[]).forEach(function(r){dy[dk].ct.add(r)});dy[dk].mg+=(p.mainMerges||0)});
OPEN.forEach(function(p){if(dy[p.c]){dy[p.c].op++;dy[p.c].ct.add(p.a)}});
CLOSED.forEach(function(p){if(dy[p.x]){dy[p.x].cl++;dy[p.x].ct.add(p.a)}});

// --- Build weekly buckets ---
var wk={};
Object.keys(dy).sort().forEach(function(dk){var w=wkOf(dk+'T00:00:00Z');if(!wk[w])wk[w]={mm:0,mf:0,op:0,cl:0,ad:0,dl:0,ct:new Set(),mg:0,ages:[]};var d=dy[dk],b=wk[w];b.mm+=d.mm;b.mf+=d.mf;b.op+=d.op;b.cl+=d.cl;b.ad+=d.ad;b.dl+=d.dl;d.ct.forEach(function(c){b.ct.add(c)});b.mg+=d.mg});
hm.forEach(function(p){var w=wkOf(p.mergedAt);if(wk[w])wk[w].ages.push((new Date(p.mergedAt)-new Date(p.createdAt))/864e5)});
var sW=Object.keys(wk).sort(),sD=Object.keys(dy).sort();

// --- Feature tracking ---
var fMain=0,fFeat=0,lMain=0,lFeat=0,fbs={};
hm.forEach(function(p){if(p.baseRefName==='main'){fMain++;lMain+=p.additions+p.deletions}else{fFeat++;lFeat+=p.additions+p.deletions;fbs[p.baseRefName]=1}});

// ===== SUMMARY CARDS =====
var c1=card(Math.round(raw.days/7)+'-Week Summary');
addM(c1,'Human PRs merged',hm.length);
addM(c1,'Unique contributors',new Set(hm.map(function(p){return p.author.login})).size);
addM(c1,'Lines changed',(lMain+lFeat).toLocaleString());
addM(c1,'Avg days to merge',hm.length?(hm.reduce(function(s,p){return s+((new Date(p.mergedAt)-new Date(p.createdAt))/864e5)},0)/hm.length).toFixed(1):'\u2014','g');
addM(c1,'Open PRs',OPEN.length);
addM(c1,'Closed (not merged)',CLOSED.length);
addM(c1,'Main merges into PRs',hm.reduce(function(s,p){return s+(p.mainMerges||0)},0));

var c2=card('Feature vs Main');
addM(c2,'Merged to main',fMain);addM(c2,'Merged to feature',fFeat);
addM(c2,'Lines to main',lMain.toLocaleString());addM(c2,'Lines to feature',lFeat.toLocaleString());
addM(c2,'Feature ratio',(fMain+fFeat)?(fFeat/(fMain+fFeat)*100).toFixed(0)+'%':'\u2014');

// ===== PR COUNTS — WEEKLY =====
var pc1=card('PR Counts \u2014 Weekly',true);
pc1.insertAdjacentHTML('beforeend',PRL+'<table><thead><tr><th>Week</th><th>M\u2192main</th><th>M\u2192feat</th><th>Opened</th><th>Closed</th><th style="width:280px">Visual</th><th>Med Age</th></tr></thead><tbody id="pcw"></tbody></table>');
var mxPW=Math.max.apply(null,sW.map(function(w){var d=wk[w];return d.mm+d.mf+d.op+d.cl}).concat([1]));
var hPW='';sW.forEach(function(w){var d=wk[w],md=d.ages.length?med(d.ages).toFixed(1):'-';hPW+='<tr><td>'+w+'</td><td>'+d.mm+'</td><td>'+d.mf+'</td><td>'+d.op+'</td><td>'+d.cl+'</td><td>'+br(bw(d.mm,mxPW,70),'#0066cc')+br(bw(d.mf,mxPW,70),'#B6A6E9')+br(bw(d.op,mxPW,70),'#4caf50')+br(bw(d.cl,mxPW,70),'#ef5350')+'</td><td class="'+(md!=='-'&&+md>5?'y':'g')+'">'+md+'</td></tr>'});
document.getElementById('pcw').insertAdjacentHTML('beforeend',hPW);

// ===== PR COUNTS — DAILY =====
var pc2=card('PR Counts \u2014 Daily ('+raw.days+' days)',true);
pc2.insertAdjacentHTML('beforeend',PRL+'<table><thead><tr><th>Date</th><th>Day</th><th>M\u2192m</th><th>M\u2192f</th><th>Open</th><th>Close</th><th style="width:260px"></th></tr></thead><tbody id="pcd"></tbody></table>');
var mxPD=Math.max.apply(null,sD.map(function(dk){var d=dy[dk];return d.mm+d.mf+d.op+d.cl}).concat([1]));
var hPD='';sD.forEach(function(dk){var d=dy[dk],tot=d.mm+d.mf+d.op+d.cl;hPD+='<tr class="'+(d.we?'wkend':'')+'"><td>'+dk+'</td><td>'+d.dn+'</td><td>'+d.mm+'</td><td>'+d.mf+'</td><td>'+d.op+'</td><td>'+d.cl+'</td><td>'+(tot?br(bw(d.mm,mxPD,100),'#0066cc')+br(bw(d.mf,mxPD,100),'#B6A6E9')+br(bw(d.op,mxPD,100),'#4caf50')+br(bw(d.cl,mxPD,100),'#ef5350'):'<span style="color:#333">\u2014</span>')+'</td></tr>'});
document.getElementById('pcd').insertAdjacentHTML('beforeend',hPD);

// ===== LINES CHANGED — WEEKLY =====
var lc1=card('Lines Changed \u2014 Weekly',true);
lc1.insertAdjacentHTML('beforeend',LNL+'<table><thead><tr><th>Week</th><th>Additions</th><th>Deletions</th><th>Net</th><th style="width:280px">Visual</th></tr></thead><tbody id="lcw"></tbody></table>');
var mxLW=Math.max.apply(null,sW.map(function(w){return wk[w].ad+wk[w].dl}).concat([1]));
var hLW='';sW.forEach(function(w){var d=wk[w],net=d.ad-d.dl;hLW+='<tr><td>'+w+'</td><td class="g">+'+d.ad.toLocaleString()+'</td><td class="r">\u2212'+d.dl.toLocaleString()+'</td><td class="'+(net>=0?'g':'r')+'">'+(net>=0?'+':'\u2212')+Math.abs(net).toLocaleString()+'</td><td>'+br(bw(d.ad,mxLW,140),'#4caf50')+br(bw(d.dl,mxLW,140),'#ef5350')+'</td></tr>'});
document.getElementById('lcw').insertAdjacentHTML('beforeend',hLW);

// ===== LINES CHANGED — DAILY =====
var lc2=card('Lines Changed \u2014 Daily ('+raw.days+' days)',true);
lc2.insertAdjacentHTML('beforeend',LNL+'<table><thead><tr><th>Date</th><th>Day</th><th>Add</th><th>Del</th><th>Net</th><th style="width:260px"></th></tr></thead><tbody id="lcd"></tbody></table>');
var mxLD=Math.max.apply(null,sD.map(function(dk){return dy[dk].ad+dy[dk].dl}).concat([1]));
var hLD='';sD.forEach(function(dk){var d=dy[dk],net=d.ad-d.dl,tot=d.ad+d.dl;hLD+='<tr class="'+(d.we?'wkend':'')+'"><td>'+dk+'</td><td>'+d.dn+'</td><td class="g">'+(d.ad?'+'+d.ad.toLocaleString():'0')+'</td><td class="r">'+(d.dl?'\u2212'+d.dl.toLocaleString():'0')+'</td><td class="'+(net>=0?'g':'r')+'">'+(tot?(net>=0?'+':'\u2212')+Math.abs(net).toLocaleString():'0')+'</td><td>'+(tot?br(bw(d.ad,mxLD,130),'#4caf50')+br(bw(d.dl,mxLD,130),'#ef5350'):'<span style="color:#333">\u2014</span>')+'</td></tr>'});
document.getElementById('lcd').insertAdjacentHTML('beforeend',hLD);

// ===== CONTRIBUTORS — WEEKLY =====
var ct1=card('Contributors \u2014 Weekly',true);
ct1.insertAdjacentHTML('beforeend','<table><thead><tr><th>Week</th><th>Count</th><th style="width:280px">Visual</th><th>Who</th></tr></thead><tbody id="ctw"></tbody></table>');
var mxCW=Math.max.apply(null,sW.map(function(w){return wk[w].ct.size}).concat([1]));
var hCW='';sW.forEach(function(w){var d=wk[w],names=Array.from(d.ct).sort().join(', ');hCW+='<tr><td>'+w+'</td><td>'+d.ct.size+'</td><td>'+br(bw(d.ct.size,mxCW,200),'#42a5f5')+'</td><td style="font-size:11px;color:#888">'+names+'</td></tr>'});
document.getElementById('ctw').insertAdjacentHTML('beforeend',hCW);

// ===== CONTRIBUTORS — DAILY =====
var ct2=card('Contributors \u2014 Daily ('+raw.days+' days)',true);
ct2.insertAdjacentHTML('beforeend','<table><thead><tr><th>Date</th><th>Day</th><th>Count</th><th style="width:260px"></th><th>Who</th></tr></thead><tbody id="ctd"></tbody></table>');
var mxCD=Math.max.apply(null,sD.map(function(dk){return dy[dk].ct.size}).concat([1]));
var hCD='';sD.forEach(function(dk){var d=dy[dk],names=Array.from(d.ct).sort().join(', ');hCD+='<tr class="'+(d.we?'wkend':'')+'"><td>'+dk+'</td><td>'+d.dn+'</td><td>'+d.ct.size+'</td><td>'+(d.ct.size?br(bw(d.ct.size,mxCD,150),'#42a5f5'):'<span style="color:#333">\u2014</span>')+'</td><td style="font-size:11px;color:#888">'+names+'</td></tr>'});
document.getElementById('ctd').insertAdjacentHTML('beforeend',hCD);

// ===== MAIN MERGES — WEEKLY =====
var mg1=card('Main Merges into PRs \u2014 Weekly',true);
mg1.insertAdjacentHTML('beforeend','<p style="font-size:11px;color:#666;margin-bottom:8px">Times a PR merged the main branch to stay up-to-date (GitHub &ldquo;Update branch&rdquo; or manual git merge main)</p><table><thead><tr><th>Week</th><th>Count</th><th style="width:280px">Visual</th></tr></thead><tbody id="mmw"></tbody></table>');
var mxMW=Math.max.apply(null,sW.map(function(w){return wk[w].mg}).concat([1]));
var hMW='';sW.forEach(function(w){var d=wk[w];hMW+='<tr><td>'+w+'</td><td>'+d.mg+'</td><td>'+br(bw(d.mg,mxMW,200),'#f0c674')+'</td></tr>'});
document.getElementById('mmw').insertAdjacentHTML('beforeend',hMW);

// ===== MAIN MERGES — DAILY =====
var mg2=card('Main Merges into PRs \u2014 Daily ('+raw.days+' days)',true);
mg2.insertAdjacentHTML('beforeend','<table><thead><tr><th>Date</th><th>Day</th><th>Count</th><th style="width:260px"></th></tr></thead><tbody id="mmd"></tbody></table>');
var mxMD=Math.max.apply(null,sD.map(function(dk){return dy[dk].mg}).concat([1]));
var hMD='';sD.forEach(function(dk){var d=dy[dk];hMD+='<tr class="'+(d.we?'wkend':'')+'"><td>'+dk+'</td><td>'+d.dn+'</td><td>'+d.mg+'</td><td>'+(d.mg?br(bw(d.mg,mxMD,150),'#f0c674'):'<span style="color:#333">\u2014</span>')+'</td></tr>'});
document.getElementById('mmd').insertAdjacentHTML('beforeend',hMD);

// ===== TOP CONTRIBUTORS =====
var tc=card('Top Contributors',true);
tc.insertAdjacentHTML('beforeend','<table><thead><tr><th>Author</th><th>PRs</th><th style="width:140px"></th><th>Lines</th><th>Avg Days</th><th>Main</th><th>Feat</th></tr></thead><tbody id="tcb"></tbody></table>');
var cs={};hm.forEach(function(p){var l=p.author.login;if(!cs[l])cs[l]={p:0,li:0,ds:[],tm:0,tf:0};cs[l].p++;cs[l].li+=p.additions+p.deletions;cs[l].ds.push((new Date(p.mergedAt)-new Date(p.createdAt))/864e5);if(p.baseRefName==='main')cs[l].tm++;else cs[l].tf++});
var sc=Object.entries(cs).sort(function(a,b){return b[1].p-a[1].p}),mp=sc[0]?sc[0][1].p:1;
var hTC='';sc.forEach(function(e){var n=e[0],c=e[1],av=(c.ds.reduce(function(s,v){return s+v},0)/c.ds.length).toFixed(1);hTC+='<tr><td>'+n+'</td><td>'+c.p+'</td><td>'+br(bw(c.p,mp,120),'#0066cc')+'</td><td>'+c.li.toLocaleString()+'</td><td class="'+(+av>5?'y':'g')+'">'+av+'</td><td>'+c.tm+'</td><td>'+c.tf+'</td></tr>'});
document.getElementById('tcb').insertAdjacentHTML('beforeend',hTC);

// ===== LONGEST-LIVED + FEATURE BRANCHES =====
var ll=card('Longest-Lived Merged');
var ba=hm.slice().sort(function(a,b){return((new Date(b.mergedAt)-new Date(b.createdAt)))-((new Date(a.mergedAt)-new Date(a.createdAt)))}).slice(0,5);
ba.forEach(function(p){var days=((new Date(p.mergedAt)-new Date(p.createdAt))/864e5).toFixed(1);addM(ll,'#'+p.number+' '+p.title.slice(0,25),days+'d',+days>10?'r':'y')});

var fb=card('Feature Branches');
Object.keys(fbs).sort().forEach(function(b){addM(fb,b,'\u2713','')});

}).catch(function(e){document.getElementById('sub').textContent='Failed: '+e.message+'. Run: python3 velocity/refresh.py && cd velocity && python3 -m http.server 8080'});
</script>
</body>
